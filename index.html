<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NΞXUS</title>
  <style>
    :root{
      --bg: #070707;
      --card: #111;
      --border: #222;
      --gold: #d4a017;
      --soft: #b026ff;
      --text: #fff;
      --muted: #aaa;
    }

    /* Reset egyszerűsítés */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* TOP STRIPE - finomabb animáció */
    .top-bar {
      position: fixed;
      top: -80px;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(to bottom, #000, transparent);
      animation: drop 1.1s ease-out forwards;
      z-index: 10;
    }

    @keyframes drop {
      to { top: 0; }
    }

    header {
      text-align: center;
      padding: 100px 20px 40px;
    }

    h1 {
      color: var(--gold);
      font-size: 56px;
      letter-spacing: 5px;
    }

    .subtitle {
      color: #b026ff;
      margin-top: 6px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .box {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px;
      margin: 22px 0;
      transition: transform .2s ease;
    }
    .box:hover { transform: translateY(-2px); }

    .box h2 {
      color: var(--gold);
      margin-bottom: 8px;
      font-size: 22px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      border: 1px solid var(--gold);
      color: var(--gold);
      text-decoration: none;
      border-radius: 6px;
      transition: background-color .2s ease, color .2s ease;
    }

    .btn:hover {
      background: var(--soft);
      color: #fff;
      border-color: var(--soft);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      text-align: left;
      font-weight: normal;
    }

    .download-btn {
      border: 1px solid #b026ff;
      padding: 6px 12px;
      color: #b026ff;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color .2s ease, color .2s ease;
    }

    .download-btn:hover {
      background: #b026ff;
      color: white;
    }

    /* LICENSE notch */
    .license {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0b0b0b;
      border-top: 1px solid #222;
      z-index: 20;
    }

    .license-header {
      text-align: center;
      padding: 12px;
      cursor: pointer;
      color: var(--gold);
      user-select: none;
    }

    .license-content {
      display: none;
      padding: 12px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Responsiveness */
    @media (max-width: 800px) {
      h1 { font-size: 48px; }
      header { padding: 80px 16px 28px; }
    }
    @media (max-width: 480px) {
      h1 { font-size: 40px; }
      .subtitle { font-size: 14px; }
      .box { padding: 16px; }
    }
  </style>

  <script>
    function toggleLicense() {
      var x = document.getElementById("licenseContent");
      // egyszerű toggle
      if (x.style.display === "block") {
        x.style.display = "none";
      } else {
        x.style.display = "block";
      }
    }
  </script>
</head>

<body>

  <div class="top-bar" aria-hidden="true"></div>

  <header>
    <h1>NΞXUS</h1>
    <p class="subtitle">Gaming • Programs • Fake Virus</p>
  </header>

  <main class="container" role="main">
    <section class="box" aria-labelledby="community-title">
      <h2 id="community-title">Community</h2>
      <p>Join the NΞXUS Discord szerverét.</p>
      <a class="btn" href="https://discord.gg/IDE_A_LINKED" target="_blank" rel="noopener">
        Join Discord
      </a>
    </section>

    <section class="box" aria-labelledby="downloads-title">
      <h2 id="downloads-title">Downloads</h2>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>File</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>2026-03-20</td>
            <td>
              TEST BUTTON<br>
              <small>0 MB</small>
            </td>
            <td>
              <a class="download-btn" href="files/program1.zip" download>Download</a>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <div class="license" aria-label="Licenc pont">
    <div class="license-header" onclick="toggleLicense()" role="button" aria-expanded="false" id="licenseToggle">
      LICENSE ▼
    </div>

    <div class="license-content" id="licenseContent" aria-hidden="true">
      <p>All content is for educational and entertainment purposes only. Use at your own risk. No responsibility is taken for misuse.</p>
    </div>
  </div>

  <script>
    // ARIA állapotok frissítése a hozzáférhetőségért
    (function(){
      var btn = document.getElementById('licenseToggle');
      var content = document.getElementById('licenseContent');
      btn.addEventListener('click', function(){
        var isOpen = content.style.display === 'block';
        content.style.display = isOpen ? 'none' : 'block';
        btn.setAttribute('aria-expanded', String(!isOpen));
        content.setAttribute('aria-hidden', String(isOpen));
      });
    })();
  </script>

</body>
</html>
