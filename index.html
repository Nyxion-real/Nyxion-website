#loader {

.smoke {

  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(176,38,255,0.08), transparent);
  animation: smokeMove 20s linear infinite;
  z-index: -1;
}

@keyframes smokeMove {
  from { transform: translate(-10%, -10%); }
  to { transform: translate(10%, 10%); }
}

/* VILLÁM */
.lightning {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  animation: flash 6s infinite;
  z-index: -1;
}

@keyframes flash {

  96% { opacity: 0.4; }
  97% { opacity: 0; }

}
